<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada · Albadur</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .nf { min-height: 80vh; display: grid; place-items: center; text-align: center; padding: 40px 20px; }
    .nf img { width: 160px; margin: 0 auto 24px; }
    .nf h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); margin-bottom: 10px; }
    .nf p { color: var(--muted); margin-bottom: 24px; }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <img src="assets/img/logo.svg" alt="Albadur" />
      <h1>No encontramos esa página</h1>
      <p>El enlace puede estar roto o la página ya no existe.</p>
      <a class="btn btn-primary" href="/">Volver al catálogo</a>
    </div>
  </main>
</body>
</html>
